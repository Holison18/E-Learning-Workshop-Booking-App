stages:
  - build-and-publish
  - deploy

.notify:
  script:
    - |
      echo "===== Preparing Notification Payload ====="
      RECIPIENTS="${NOTIFY_LIST:-[]}"
      DEPLOY_ENVIRONMENT="production"
      URLS="[\"https://${PROD_URL:-elearningweek.knust.edu.gh}\"]"

      COMMITS=$(jq -n --arg msg "$CI_COMMIT_MESSAGE" '[$msg]')
      CHANGED=$(git diff-tree --no-commit-id --name-only -r $CI_COMMIT_SHA 2>/dev/null | jq -R . | jq -s . || echo "[]")
      
      PAYLOAD=$(jq -n \
        --arg     project    "$CI_PROJECT_NAME" \
        --argjson services   "[\"elearning-workshop\"]" \
        --arg     env        "$DEPLOY_ENVIRONMENT" \
        --arg     version    "$TAG" \
        --arg     deployer   "${GITLAB_USER_EMAIL:-$GITLAB_USER_NAME}" \
        --argjson recipients "$RECIPIENTS" \
        --argjson urls       "$URLS" \
        --argjson commits    "$COMMITS" \
        --argjson changed    "$CHANGED" \
        --arg     changelog  "$CI_COMMIT_MESSAGE" \
        '{project_name:$project,service_names:$services,environment:$env,
          version:$version,deployed_by:$deployer,
          additional_recipients:$recipients,urls:$urls,
          commits:$commits,changed_files:$changed,changelog:$changelog}')

      echo "===== Notification Payload ====="
      echo "$PAYLOAD" | jq '.'
      
      if [ -n "$NOTIFICATION_URL" ]; then
        echo "===== Sending to $NOTIFICATION_URL ====="
        HTTP=$(curl -s -o /tmp/_notify_resp.txt -w "%{http_code}" \
          -X POST \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "$NOTIFICATION_URL" 2>/dev/null || echo "error")
        echo "===== Response (HTTP $HTTP) ====="
        cat /tmp/_notify_resp.txt 2>/dev/null || true
        echo ""
        case "$HTTP" in
          2*)
            echo "Notification sent (HTTP $HTTP)"
            ;;
          *)
            echo "##[warning]Notification failed (HTTP $HTTP) — non-critical"
            ;;
        esac
      else
        echo "##[warning]NOTIFICATION_URL is not set. Skipping notification."
      fi

build-and-publish:
  stage: build-and-publish
  tags:
    - swarm-manager
  before_script:
    - PKG_VERSION=$(grep -m1 '"version"' package.json | cut -d'"' -f4)
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export TAG="$CI_COMMIT_TAG"
      else
        export TAG="${PKG_VERSION}-${CI_COMMIT_SHORT_SHA}"
      fi
    - echo "TAG=$TAG" >> build.env
    - echo "Building version $TAG"
  script:
    - |
      docker build --pull \
        --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
        --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
        --build-arg NEXT_PUBLIC_SUPPORT_EMAIL="$NEXT_PUBLIC_SUPPORT_EMAIL" \
        -t "$IMAGE_NAME:$TAG" .
    - docker push "$IMAGE_NAME:$TAG"
  artifacts:
    reports:
      dotenv: build.env


deploy-prod:
  stage: deploy
  tags:
    - swarm-manager
  dependencies:
    - build-and-publish
  script:
    - echo "Deploying production version $TAG to stack $STACK_NAME..."
    - TAG=$TAG PROD_URL=$PROD_URL IMAGE_NAME=$IMAGE_NAME docker stack deploy -c docker-compose-prod.yml $STACK_NAME --with-registry-auth
    - !reference [.notify, script]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
