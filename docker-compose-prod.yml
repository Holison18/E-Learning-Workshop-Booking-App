version: '3.8'

networks:
  knust-prod-ntwrk:
    external: true
    
services:
  elearning-workshop:
    image: "${IMAGE_NAME}:${TAG}"
    networks:
      - knust-prod-ntwrk
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - KNUST_MSG_API_KEY=${KNUST_MSG_API_KEY}
      - KNUST_MSG_CHANNEL=${KNUST_MSG_CHANNEL}
      - KNUST_MSG_APP_ID=${KNUST_MSG_APP_ID}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 1024M
          cpus: "1.00"
        reservations:
          memory: 512M
          cpus: "0.50"
      placement:
        constraints:
          - node.role == worker
          - node.labels.lifecycle == ephemeral
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=knust-prod-ntwrk"
        - "traefik.http.routers.elearning-workshop.rule=Host(`${PROD_URL}`)"
        - "traefik.http.routers.elearning-workshop.entrypoints=websecure"
        - "traefik.http.routers.elearning-workshop.tls=true"
        - "traefik.http.services.elearning-workshop.loadbalancer.server.port=3000"
        - swarmctl.enable=true
        - swarmctl.min_replicas=1
        - swarmctl.max_replicas=4
        - swarmctl.scale_up_cpu_avg=70
        - swarmctl.scale_up_cpu_max=85
        - swarmctl.scale_up_cpu_throttle=25
        - swarmctl.scale_up_mem_avg=12
        - swarmctl.scale_up_mem_max=18
        - swarmctl.scale_up_response_ms=500
        - swarmctl.scale_up_connections=50
        - swarmctl.scale_up_request_rate=0
        - swarmctl.scale_down_cpu=25
        - swarmctl.scale_down_mem=6
        - swarmctl.scale_down_connections=10
        - swarmctl.scale_down_response_ms=200
        - swarmctl.scale_down_duration=300
        - swarmctl.cooldown_after_up=120
        - swarmctl.cooldown_after_down=180
        - swarmctl.simulation_enabled=true
